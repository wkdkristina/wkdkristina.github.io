<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | Kristina Lichtenwald</title>
  <style>
      body { 
        background-color: #abc5df; 
        color: #334155; 
        font-family: 'Inter', -apple-system, sans-serif;
        line-height: 1.6;
        padding: 40px 20px;
        max-width: 900px;
        margin: 0 auto;
    }
  
    h1, h2, h3 { 
        color: #0F172A; 
        margin-top: 1.5em;
        font-weight: 700;
    }
  
    h1 { border-bottom: 2px solid #E2E8F0; padding-bottom: 15px; }
  
    a { 
        color: #2563EB; 
        text-decoration: none; 
        font-weight: 500;
        transition: color 0.2s ease;
    }
    a:hover { color: #1E40AF; text-decoration: underline; }
  
    .case-study-card {
        background: #d7dff5;
        border: 1px solid #E2E8F0;
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 20px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
   
    .case-study-card h3 {
    margin-top: 0; /* This removes that big gap at the top */
    margin-bottom: 10px; /* Keeps a nice small gap before the text starts */
    font-size: 1.25rem;
    color: #0F172A;
    }
    .case-study-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    hr { border: 0; height: 1px; background: #E2E8F0; margin: 2em 0; }

    .nav-bar {
        font-size: 0.85rem; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        text-align: center;
        margin-bottom: 40px;
        padding: 10px 0;
        border-bottom: 1px solid #E2E8F0;
    }
  
    .nav-bar a {
        margin: 0 12px;
        color: #64748b; 
    }
    
    .nav-bar a:hover {
        color: #2563EB; 
    }
  </style>
</head>
<body>
  <div class="nav-bar">
  <a href="/" {% if page.title == "Home" %}style="font-weight: 800; color: #0F172A;"{% endif %}>Home</a> | 
  <a href="/technical.html" {% if page.title == "Technical" %}style="font-weight: 800; color: #0F172A;"{% endif %}>Technical</a> | 
  <a href="/data-analytics.html" {% if page.title == "Data" %}style="font-weight: 800; color: #0F172A;"{% endif %}>Data</a> | 
  <a href="/content-strategy.html" {% if page.title == "Strategy" %}style="font-weight: 800; color: #0F172A;"{% endif %}>Strategy</a> | 
  <a href="/case-studies.html" {% if page.title == "Case Studies" %}style="font-weight: 800; color: #0F172A;"{% endif %}>Case Studies</a> | 
  <a href="/contact.html" {% if page.title == "Contact" %}style="font-weight: 800; color: #0F172A;"{% endif %}>Contact</a>
</div>

  {{ content }}

</body>
</html>
