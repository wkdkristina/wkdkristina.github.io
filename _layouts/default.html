<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | Kristina Lichtenwald</title>
  <style>
      body { 
        background-color: #abc5df; 
        color: #334155; 
        font-family: 'Inter', -apple-system, sans-serif;
        line-height: 1.6;
        padding: 40px 20px;
        max-width: 900px;
        margin: 0 auto;
    }
  
    h1, h2, h3 { 
        color: #0F172A; 
        margin-top: 1.5em;
        font-weight: 700;
    }
  
    h1 { border-bottom: 2px solid #E2E8F0; padding-bottom: 15px; }
  
    a { 
        color: #2563EB; 
        text-decoration: none; 
        font-weight: 500;
        transition: color 0.2s ease;
    }
    a:hover { color: #1E40AF; text-decoration: underline; }
  
    .case-study-card {
        background: #d7dff5;
        border: 1px solid #E2E8F0;
        border-radius: 12px;
        padding: 5px 10px;
        margin-bottom: 20px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    div.case-study-card > *:first-child {
        margin-top: 0px;
        padding-top: 0px;
    }

    h1:first-of-type {
        margin-top: 10px; 
    }
    
    .case-study-card h2 {
        margin-top: 0; 
        margin-bottom: 10px; 
        font-size: 1.25rem;
        color: #0F172A;
    }
    .case-study-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

   hr { border: 0; height: 1px; background: #E2E8F0; margin: 2em 0; }

    .nav-bar {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
        margin-bottom: 40px;
        padding: 10px 0;
        border-bottom: 1px solid #E2E8F0;
    }

    .nav-bar a, .dropdown {
        display: inline-block;
        vertical-align: middle;
        margin: 0 12px;
    }

    .nav-bar a {
        color: #64748b;
        text-decoration: none;
        transition: color 0.2s;
    }

    .nav-bar a:hover, .dropdown:hover .dropbtn {
        color: #2563EB;
    }

    .dropdown {
        display: inline-block;
        position: relative;
        padding-bottom: 15px; 
        margin-bottom: -15px;
    }

    .dropdown-content {
        display: none; 
        position: absolute;
        left: 50%;
        transform: translateX(-50%); 
        background-color: #FFFFFF;
        min-width: 260px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
        z-index: 100;
        border: 1px solid #E2E8F0;
        border-radius: 8px;
        text-align: left;
        top: 100%;
        margin-top: -5px;
    }

    .dropdown-content a {
        color: #64748B !important;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        font-size: 0.8rem;
        border-bottom: 1px solid #F8FAFC;
        margin: 0 !important; 
        font-weight: 400 !important;
        text-transform: none; 
    }

    .dropdown-content a:last-child {
        border-bottom: none;
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    .dropdown-content a:hover {
        background-color: #F8FAFC;
        color: #2563EB !important;
    }

    .nav-bar a.active {
        font-weight: 800;
        color: #1e293b; 
        border-bottom: 2px solid #2563EB; 
        padding-bottom: 5px;
    }


    .dropdown-content a.active {
        border-bottom: 1px solid #F8FAFC; 
        background-color: #F1F5F9;
    }

  </style>
</head>
<body>
  <nav class="nav-bar">
  <a href="/" class="{% if page.url == '/' %}active{% endif %}">Home</a>
  <a href="/technical.html" class="{% if page.url contains '/technical/' %}active{% endif %}">Technical</a>
  <a href="/data-analytics.html" class="{% if page.url contains '/data-analytics/' %}active{% endif %}">Data Analytics</a>
  <a href="/content-strategy.html" class="{% if page.url contains '/content-strategy/' %}active{% endif %}">Strategy</a>
  
  <div class="dropdown">
    <a href="/case-studies.html" class="dropbtn {% if page.url contains '/case-studies/' %}active{% endif %}">Case Studies ▾</a>
    <div class="dropdown-content">
      <a href="/case-studies.html">Overview</a>
      <a href="/case-studies/technical/crawl-budget.html">1. Crawl Budget</a>
      <a href="/case-studies/technical/geo-schema.html">2. GEO & Schema</a>
      <a href="/case-studies/technical/site-migration.html">3. Site Migration</a>
      <a href="/case-studies/data-analytics/content-decay.html">4. Content Decay</a>
      <a href="/case-studies/data-analytics/attribution.html">5. Multi-Touch Attribution</a>
      <a href="/case-studies/data-analytics/leak-detection.html">6. The Leak Detection</a>
      <a href="/case-studies/content-strategy/competitive-conquest.html">7. Competitive Conquest</a>
      <a href="/case-studies/content-strategy/editorial-engine.html">8. Editorial Engine</a>
      <a href="/case-studies/content-strategy/stakeholder-management.html">9. Stakeholder Management</a>
    </div>
  </div>
  
  <a href="/contact/" class="{% if page.url contains '/contact/' %}active{% endif %}">Contact</a>
</nav>

  {{ content }}

</body>
</html>
